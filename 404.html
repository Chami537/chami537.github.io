<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Chami</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Inter', 'Noto Sans SC', sans-serif;
    background: #fafafa; color: #333;
  }
  html.dark body { background: #1a1a2e; color: #ccc; }
  .wrap { text-align: center; padding: 48px 24px; }
  h1 { font-size: 72px; font-weight: 800; color: #ccc; margin-bottom: 8px; }
  html.dark h1 { color: #444; }
  p { font-size: 16px; color: #888; margin-bottom: 24px; }
  a { color: #0066ff; text-decoration: none; font-size: 15px; }
  a:hover { text-decoration: underline; }
  .theme-btn {
    position: fixed; top: 16px; right: 16px;
    background: none; border: 1px solid #ddd; border-radius: 8px;
    padding: 8px 12px; font-size: 18px; cursor: pointer;
  }
  html.dark .theme-btn { border-color: #444; }
</style>
<script>
  if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  function toggleTheme() {
    var isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.querySelector('.theme-btn').textContent = isDark ? '☀️' : '🌙';
  }
</script>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
<div class="wrap">
  <h1>404</h1>
  <p>这个页面不存在，或者已经被删除了。</p>
  <a href="/index.html">← 回到首页</a>
</div>
</body>
</html>
