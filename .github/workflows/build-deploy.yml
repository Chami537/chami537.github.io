name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BROWSER_SMOKE_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt
      - run: pip install playwright==1.52.0
      - run: python -m playwright install --with-deps chromium
      - run: python manage.py build
      - run: python -m pytest tests/test_browser_smoke.py -v

  build:
    needs: browser-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - run: python -m pytest tests/ -v --ignore=tests/test_build_artifacts.py

      - run: python manage.py build

      - run: python -m pytest tests/test_build_artifacts.py -v

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deploy
        uses: actions/deploy-pages@v4
