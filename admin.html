<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chami — Site Admin</title>
<style>

:root {
  --bg: #f9f9fa;
  --fg: #333;
  --border: #e1e4e8;
  --accent: #0366d6;
  --danger: #d73a49;
  --muted: #999;
  --card-bg: #fff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--fg);
  font-size: 14px;
  line-height: 1.6;
}

/* Header */
.header {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
  position: sticky; top: 0; z-index: 100;
}
.header h1 { font-size: 16px; font-weight: 700; }
.header .status { font-size: 12px; color: var(--muted); }

/* Tabs */
.tabs {
  display: flex; gap: 0;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.tab-btn {
  padding: 12px 20px; border: none; background: none;
  font-size: 13px; font-weight: 600; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
}
.tab-btn:hover { color: var(--fg); }
.tab-btn.active { color: var(--fg); border-bottom-color: var(--accent); }

/* Content */
.content { max-width: 900px; margin: 0 auto; padding: 24px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Cards */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 12px;
}
.card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px;
}
.card-title { font-size: 16px; font-weight: 600; }
.card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.card-actions { display: flex; gap: 8px; }

/* Buttons */
.btn {
  padding: 6px 14px; border: 1px solid var(--border);
  border-radius: 6px; background: var(--card-bg);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: background .2s, border-color .2s;
}
.btn:hover { background: #f3f4f6; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #0256b9; }
.btn-danger { color: var(--danger); border-color: var(--danger); }
.btn-danger:hover { background: #fff0f0; }
.btn-sm { padding: 4px 10px; font-size: 11px; }

/* Forms */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; letter-spacing: .06em; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 13px; font-family: inherit;
  background: var(--bg);
}
.form-group textarea { resize: vertical; min-height: 80px; font-family: monospace; }

/* Tags display */
.tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.tag {
  font-size: 10px; font-weight: 600; letter-spacing: .06em;
  padding: 2px 8px; border-radius: 4px; background: #f0f0f0; color: #666;
}

/* Photo grid */
.photo-grid-admin {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.photo-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; position: relative;
}
.photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.photo-info { padding: 8px; font-size: 11px; }
.photo-info .fn { font-weight: 600; word-break: break-all; }
.photo-info .sz { color: var(--muted); }
.photo-card .del-btn {
  position: absolute; top: 4px; right: 4px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,0.5); color: #fff; border: none;
  font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; line-height: 1;
}
.photo-exif { font-size: 10px; color: var(--muted); margin-top: 4px; }

/* Dialog */
dialog {
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  padding: 24px;
  max-width: 480px;
  width: 90%;
}
dialog::backdrop { background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); }
dialog h3 { font-size: 16px; margin-bottom: 16px; }
dialog .form-group input { width: 100%; }
dialog .btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

/* Git panel */
.git-status { font-family: monospace; font-size: 12px; white-space: pre-wrap; background: #f6f8fa; padding: 16px; border-radius: 6px; margin-bottom: 12px; }
.git-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 12px 20px; border-radius: 8px; color: #fff;
  font-size: 13px; font-weight: 600; z-index: 999;
  animation: toast-in .3s ease;
}
.toast-ok { background: #28a745; }
.toast-err { background: var(--danger); }
@keyframes toast-in { from { opacity: 0; transform: translateY(10px); } }

/* Preview panel */
.preview-panel {
  background: #fafaf8; border: 1px solid var(--border);
  border-radius: 8px; padding: 24px; margin-top: 12px;
  max-width: 680px; font-family: 'Inter', 'Noto Sans SC', sans-serif;
  font-size: 17px; line-height: 1.9;
}
.preview-panel h2 { font-size: 21px; margin-top: 1.5em; }
.preview-panel blockquote {
  border-left: 2px solid #ffb800; padding-left: 16px;
  margin: 1em 0; color: #555; font-style: italic;
}
.preview-panel p { margin-top: 1em; }
.preview-panel strong { font-weight: 600; }

</style>
</head>
<body>

<div class="header">
  <h1>Chami Site Admin</h1>
  <span class="status" id="git-badge">loading...</span>
</div>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('work')">Work</button>
  <button class="tab-btn" onclick="switchTab('essays')">Essays</button>
  <button class="tab-btn" onclick="switchTab('photos')">Photos</button>
  <button class="tab-btn" onclick="switchTab('friends')">Friends</button>
  <button class="tab-btn" onclick="switchTab('git')">Git</button>
</nav>

<div class="content">

  <!-- ═══ WORK ═══ -->
  <div id="tab-work" class="tab-panel active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:18px;">Work 项目</h2>
      <button class="btn btn-primary" onclick="showWorkForm()">+ 添加项目</button>
    </div>
    <div id="work-list"></div>
    <div id="work-form" style="display:none;" class="card">
      <h3 id="work-form-title">新建项目</h3>
      <input type="hidden" id="work-edit-id">
      <div class="form-group"><label>标题</label><input id="work-title"></div>
      <div class="form-group"><label>描述</label><textarea id="work-desc" rows="2"></textarea></div>
      <div class="form-group"><label>链接 URL</label><input id="work-url"></div>
      <div class="form-group"><label>GitHub Repo (Owner/Name)</label><input id="work-repo"></div>
      <div class="form-group"><label>技术标签 (逗号分隔)</label><input id="work-tags" placeholder="Python, Flask, SQLite"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="saveWork()">保存</button>
        <button class="btn" onclick="hideWorkForm()">取消</button>
      </div>
    </div>
  </div>

  <!-- ═══ ESSAYS ═══ -->
  <div id="tab-essays" class="tab-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:18px;">Essays 随笔</h2>
      <button class="btn btn-primary" onclick="showEssayForm()">+ 新建随笔</button>
    </div>
    <div id="essay-list"></div>
    <div id="essay-form" style="display:none;" class="card">
      <h3 id="essay-form-title">新建随笔</h3>
      <input type="hidden" id="essay-edit-slug">
      <div class="form-group"><label>Slug (URL 标识, 如 can-xia)</label><input id="essay-slug" placeholder="my-essay"></div>
      <div class="form-group"><label>标题</label><input id="essay-title"></div>
      <div class="form-group"><label>分类标签</label><input id="essay-tag" placeholder="随笔 / 生活 / 技术"></div>
      <div class="form-group"><label>日期 (YYYY-MM)</label><input id="essay-date" placeholder="2025-07"></div>
      <div class="form-group"><label>阅读时间 (分钟)</label><input id="essay-readtime" type="number" value="4"></div>
      <div class="form-group"><label>题记</label><input id="essay-epigraph"></div>
      <div class="form-group"><label>摘要</label><textarea id="essay-excerpt" rows="2"></textarea></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="saveEssay()">保存</button>
        <button class="btn" onclick="hideEssayForm()">取消</button>
      </div>
    </div>
    <!-- Content editor -->
    <div id="essay-content-editor" style="display:none;" class="card">
      <h3>编辑正文 <span style="font-weight:400;color:var(--muted);font-size:12px;" id="essay-content-title"></span></h3>
      <div class="form-group">
        <label>Markdown 内容</label>
        <textarea id="essay-content-md" rows="16" placeholder="写 Markdown...

## 小标题

正文段落。

> 引用文字。

**加粗** 和 *斜体*。"></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="btn btn-primary" onclick="saveEssayContent()">保存内容</button>
        <button class="btn" onclick="previewEssayContent()">预览</button>
        <button class="btn" onclick="hideEssayContentEditor()">关闭</button>
      </div>
      <div id="essay-preview" class="preview-panel" style="display:none;"></div>
    </div>
  </div>

  <!-- ═══ PHOTOS ═══ -->
  <div id="tab-photos" class="tab-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:18px;">Photos 照片</h2>
      <form id="upload-form" enctype="multipart/form-data" style="display:flex;gap:8px;align-items:center;">
        <input type="file" name="file" accept="image/*" id="photo-file" style="font-size:12px;">
        <select name="size" id="photo-size" style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;">
          <option value="sm">sm (2列)</option>
          <option value="md">md (3列)</option>
          <option value="lg">lg (3列×2行)</option>
        </select>
        <button type="button" class="btn btn-primary" onclick="uploadPhoto()">上传</button>
      </form>
    </div>
    <div id="photo-grid" class="photo-grid-admin"></div>
  </div>

  <!-- ═══ FRIENDS ═══ -->
  <div id="tab-friends" class="tab-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:18px;">Friends 友链</h2>
      <button class="btn btn-primary" onclick="showFriendForm()">+ 添加友链</button>
    </div>
    <div id="friend-list"></div>
    <div id="friend-form" style="display:none;" class="card">
      <h3 id="friend-form-title">添加友链</h3>
      <input type="hidden" id="friend-edit-index">
      <div class="form-group"><label>名称</label><input id="friend-name"></div>
      <div class="form-group"><label>URL</label><input id="friend-url"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="saveFriend()">保存</button>
        <button class="btn" onclick="hideFriendForm()">取消</button>
      </div>
    </div>
  </div>

  <!-- ═══ GIT ═══ -->
  <div id="tab-git" class="tab-panel">
    <h2 style="font-size:18px;margin-bottom:16px;">Git 状态</h2>
    <div class="git-status" id="git-status-text">Loading...</div>
    <div class="git-actions">
      <button class="btn" onclick="refreshGitStatus()">刷新状态</button>
      <button class="btn btn-primary" onclick="showCommitDialog()">Commit</button>
      <button class="btn btn-danger" onclick="confirmRevert()">Revert 撤销</button>
      <button class="btn btn-primary" onclick="handlePush()">Push</button>
    </div>
  </div>

</div>

<!-- Commit Dialog -->
<dialog id="commit-dialog">
  <form method="dialog" id="commit-form">
    <h3>提交更改</h3>
    <div class="form-group">
      <label>Commit 消息</label>
      <input type="text" id="commit-msg" placeholder="描述你的更改..." required>
    </div>
    <div class="btn-row">
      <button value="cancel" type="button" onclick="this.closest('dialog').close()">取消</button>
      <button value="default" type="submit" class="btn btn-primary">确认提交</button>
    </div>
  </form>
</dialog>

<!-- Confirm Dialog -->
<dialog id="confirm-dialog">
  <form method="dialog">
    <h3 id="confirm-msg">确认操作？</h3>
    <div class="btn-row">
      <button value="cancel" type="button" onclick="this.closest('dialog').close()">取消</button>
      <button value="default" type="submit" class="btn btn-danger" id="confirm-yes">确认</button>
    </div>
  </form>
</dialog>

<script>
// ═══════════════════════════════════
// Globals
// ═══════════════════════════════════
let isDirty = false;
document.addEventListener('input', (e) => {
  if (e.target.matches('input, textarea')) isDirty = true;
});
window.addEventListener('beforeunload', (e) => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body && !(body instanceof FormData)) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  } else if (body instanceof FormData) {
    opts.body = body;
  }
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ error: r.statusText }));
    throw new Error(err.error || r.statusText);
  }
  return r.json();
}

function toast(msg, err) {
  const t = document.createElement('div');
  t.className = 'toast ' + (err ? 'toast-err' : 'toast-ok');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function markClean() { isDirty = false; }

// ═══════════════════════════════════
// Tabs
// ═══════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'work') loadWork();
  if (name === 'essays') loadEssays();
  if (name === 'photos') loadPhotos();
  if (name === 'friends') loadFriends();
  if (name === 'git') refreshGitStatus();
}

// ═══════════════════════════════════
// Work
// ═══════════════════════════════════
async function loadWork() {
  const data = await api('GET', '/api/work');
  document.getElementById('work-list').innerHTML = data.map(w => `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${pad2(w.id)} ${esc(w.title)}</div>
          <div class="card-meta">${esc(w.description)}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-sm" onclick="editWork(${w.id})">编辑</button>
          <button class="btn btn-sm btn-danger" onclick="deleteWork(${w.id})">删除</button>
        </div>
      </div>
      <div class="tags">${(w.tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
      <div class="card-meta" style="margin-top:6px;">🔗 ${esc(w.url)} ${w.repo ? '· ⭐ '+esc(w.repo) : ''}</div>
    </div>
  `).join('');
}

function pad2(n) { return String(n).padStart(2, '0'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function editWork(id) {
  const data = await api('GET', '/api/work');
  const w = data.find(x => x.id === id);
  if (!w) return;
  document.getElementById('work-edit-id').value = id;
  document.getElementById('work-title').value = w.title;
  document.getElementById('work-desc').value = w.description;
  document.getElementById('work-url').value = w.url;
  document.getElementById('work-repo').value = w.repo || '';
  document.getElementById('work-tags').value = (w.tags||[]).join(', ');
  document.getElementById('work-form-title').textContent = '编辑项目';
  document.getElementById('work-form').style.display = 'block';
  document.getElementById('work-form').scrollIntoView({ behavior: 'smooth' });
}

function showWorkForm() {
  document.getElementById('work-edit-id').value = '';
  document.getElementById('work-form').reset();
  document.getElementById('work-form-title').textContent = '新建项目';
  document.getElementById('work-form').style.display = 'block';
  document.getElementById('work-form').scrollIntoView({ behavior: 'smooth' });
}

function hideWorkForm() { document.getElementById('work-form').style.display = 'none'; }

async function saveWork() {
  const id = document.getElementById('work-edit-id').value;
  const item = {
    title: document.getElementById('work-title').value,
    description: document.getElementById('work-desc').value,
    url: document.getElementById('work-url').value,
    repo: document.getElementById('work-repo').value,
    tags: document.getElementById('work-tags').value.split(',').map(s => s.trim()).filter(Boolean),
  };
  if (id) {
    await api('PUT', '/api/work/' + id, item);
  } else {
    await api('POST', '/api/work', item);
  }
  markClean();
  hideWorkForm();
  loadWork();
  toast(id ? '项目已更新' : '项目已创建');
}

async function deleteWork(id) {
  const confirmed = await confirmDialog('确定删除这个项目？');
  if (!confirmed) return;
  await api('DELETE', '/api/work/' + id);
  loadWork();
  toast('项目已删除');
}

// ═══════════════════════════════════
// Essays
// ═══════════════════════════════════
async function loadEssays() {
  const data = await api('GET', '/api/essays');
  document.getElementById('essay-list').innerHTML = data.map(e => `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${esc(e.title)}</div>
          <div class="card-meta">${esc(e.tag)} · ${esc(e.date)} · ${e.readTime} min · slug: ${esc(e.slug)}</div>
          <div class="card-meta" style="font-style:italic;">${esc(e.epigraph||'')}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-sm" onclick="editEssayMeta('${esc(e.slug)}')">元数据</button>
          <button class="btn btn-sm" onclick="editEssayContent('${esc(e.slug)}')">编辑正文</button>
          <button class="btn btn-sm btn-danger" onclick="deleteEssay('${esc(e.slug)}')">删除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function showEssayForm() {
  document.getElementById('essay-edit-slug').value = '';
  document.getElementById('essay-form').reset();
  document.getElementById('essay-slug').readOnly = false;
  document.getElementById('essay-form-title').textContent = '新建随笔';
  document.getElementById('essay-form').style.display = 'block';
  document.getElementById('essay-form').scrollIntoView({ behavior: 'smooth' });
}

function hideEssayForm() { document.getElementById('essay-form').style.display = 'none'; }

async function editEssayMeta(slug) {
  const data = await api('GET', '/api/essays');
  const e = data.find(x => x.slug === slug);
  if (!e) return;
  document.getElementById('essay-edit-slug').value = slug;
  document.getElementById('essay-slug').value = slug;
  document.getElementById('essay-slug').readOnly = true;
  document.getElementById('essay-title').value = e.title;
  document.getElementById('essay-tag').value = e.tag;
  document.getElementById('essay-date').value = e.date;
  document.getElementById('essay-readtime').value = e.readTime;
  document.getElementById('essay-epigraph').value = e.epigraph || '';
  document.getElementById('essay-excerpt').value = e.excerpt || '';
  document.getElementById('essay-form-title').textContent = '编辑元数据';
  document.getElementById('essay-form').style.display = 'block';
  document.getElementById('essay-form').scrollIntoView({ behavior: 'smooth' });
}

async function saveEssay() {
  const editSlug = document.getElementById('essay-edit-slug').value;
  const item = {
    slug: document.getElementById('essay-slug').value,
    title: document.getElementById('essay-title').value,
    tag: document.getElementById('essay-tag').value,
    date: document.getElementById('essay-date').value,
    readTime: parseInt(document.getElementById('essay-readtime').value) || 4,
    epigraph: document.getElementById('essay-epigraph').value,
    excerpt: document.getElementById('essay-excerpt').value,
  };
  try {
    if (editSlug) {
      await api('PUT', '/api/essays/' + editSlug, item);
      toast('元数据已更新');
    } else {
      await api('POST', '/api/essays', item);
      toast('随笔已创建，HTML 文件已生成');
    }
    markClean();
    hideEssayForm();
    loadEssays();
  } catch(e) { toast(e.message, true); }
}

async function editEssayContent(slug) {
  document.getElementById('essay-content-editor').style.display = 'block';
  document.getElementById('essay-content-title').textContent = '— ' + slug;
  document.getElementById('essay-content-editor').dataset.slug = slug;
  try {
    const data = await api('GET', '/api/essays/' + slug + '/content');
    document.getElementById('essay-content-md').value = data.format === 'markdown' ? data.content : '';
  } catch(e) {
    document.getElementById('essay-content-md').value = '';
  }
  document.getElementById('essay-content-editor').scrollIntoView({ behavior: 'smooth' });
}

function hideEssayContentEditor() {
  document.getElementById('essay-content-editor').style.display = 'none';
  document.getElementById('essay-preview').style.display = 'none';
}

async function saveEssayContent() {
  const slug = document.getElementById('essay-content-editor').dataset.slug;
  const md = document.getElementById('essay-content-md').value;
  try {
    await api('PUT', '/api/essays/' + slug + '/content', { content: md });
    markClean();
    toast('正文已保存并注入 HTML');
  } catch(e) { toast(e.message, true); }
}

async function previewEssayContent() {
  const md = document.getElementById('essay-content-md').value;
  try {
    const data = await api('GET', '/api/essays/x/html?md=' + encodeURIComponent(md));
    document.getElementById('essay-preview').innerHTML = data.html;
    document.getElementById('essay-preview').style.display = 'block';
  } catch(e) { toast(e.message, true); }
}

async function deleteEssay(slug) {
  const confirmed = await confirmDialog('确定删除随笔 "' + slug + '"？这将同时删除 HTML 文件。');
  if (!confirmed) return;
  await api('DELETE', '/api/essays/' + slug);
  loadEssays();
  toast('随笔已删除');
}

// ═══════════════════════════════════
// Photos
// ═══════════════════════════════════
async function loadPhotos() {
  const data = await api('GET', '/api/photos');
  document.getElementById('photo-grid').innerHTML = data.map((p, i) => `
    <div class="photo-card">
      <img src="/images/sm/${p.filename}" alt="${esc(p.filename)}">
      <button class="del-btn" onclick="deletePhoto('${esc(p.filename)}')">×</button>
      <div class="photo-info">
        <div class="fn">${esc(p.filename)}</div>
        <div class="sz">${p.size} ${p.exif && p.exif.camera ? '· '+esc(p.exif.camera) : ''}</div>
        ${p.exif && Object.keys(p.exif).length ? `<div class="photo-exif">${esc(p.exif.aperture||'')} ${esc(p.exif.shutter||'')} ISO${esc(p.exif.iso||'')}</div>` : ''}
      </div>
    </div>
  `).join('');
}

async function uploadPhoto() {
  const fileInput = document.getElementById('photo-file');
  const file = fileInput.files[0];
  if (!file) { toast('请选择文件', true); return; }
  const formData = new FormData();
  formData.append('file', file);
  formData.append('size', document.getElementById('photo-size').value);
  try {
    const result = await api('POST', '/api/photos/upload', formData);
    toast('照片已上传');
    if (result.exif && Object.keys(result.exif).length) {
      toast('EXIF: ' + JSON.stringify(result.exif));
    }
    fileInput.value = '';
    loadPhotos();
  } catch(e) { toast(e.message, true); }
}

async function deletePhoto(filename) {
  const confirmed = await confirmDialog('确定删除照片 "' + filename + '"？');
  if (!confirmed) return;
  await api('DELETE', '/api/photos/' + filename);
  loadPhotos();
  toast('照片已删除');
}

// ═══════════════════════════════════
// Friends
// ═══════════════════════════════════
async function loadFriends() {
  const data = await api('GET', '/api/friends');
  document.getElementById('friend-list').innerHTML = data.map((f, i) => `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${esc(f.name)}</div>
          <div class="card-meta">${esc(f.url)}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-sm" onclick="editFriend(${i})">编辑</button>
          <button class="btn btn-sm btn-danger" onclick="deleteFriend(${i})">删除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function showFriendForm() {
  document.getElementById('friend-edit-index').value = '';
  document.getElementById('friend-form').reset();
  document.getElementById('friend-form-title').textContent = '添加友链';
  document.getElementById('friend-form').style.display = 'block';
  document.getElementById('friend-form').scrollIntoView({ behavior: 'smooth' });
}

function hideFriendForm() { document.getElementById('friend-form').style.display = 'none'; }

function editFriend(i) {
  document.getElementById('friend-edit-index').value = i;
  document.getElementById('friend-form-title').textContent = '编辑友链';
  document.getElementById('friend-form').style.display = 'block';
  loadFriends().then(() => {
    api('GET', '/api/friends').then(data => {
      document.getElementById('friend-name').value = data[i].name;
      document.getElementById('friend-url').value = data[i].url;
    });
  });
  document.getElementById('friend-form').scrollIntoView({ behavior: 'smooth' });
}

async function saveFriend() {
  const idx = document.getElementById('friend-edit-index').value;
  const item = { name: document.getElementById('friend-name').value, url: document.getElementById('friend-url').value };
  if (idx !== '') {
    await api('PUT', '/api/friends/' + idx, item);
  } else {
    await api('POST', '/api/friends', item);
  }
  markClean();
  hideFriendForm();
  loadFriends();
  toast('友链已保存');
}

async function deleteFriend(i) {
  const confirmed = await confirmDialog('确定删除这个友链？');
  if (!confirmed) return;
  await api('DELETE', '/api/friends/' + i);
  loadFriends();
  toast('友链已删除');
}

// ═══════════════════════════════════
// Git
// ═══════════════════════════════════
async function refreshGitStatus() {
  try {
    const data = await api('GET', '/api/git/status');
    document.getElementById('git-badge').textContent = data.branch + (data.clean ? ' ✓' : ' ✗ modified');
    document.getElementById('git-status-text').textContent =
      'Branch: ' + data.branch + '\n' +
      'Status: ' + (data.clean ? 'Clean' : 'Modified') + '\n\n' +
      'Files:\n' + (data.files.length ? data.files.join('\n') : '(none)') + '\n\n' +
      'Diff Stat:\n' + (data.diffStat || '(none)');
  } catch(e) {
    document.getElementById('git-status-text').textContent = 'Error: ' + e.message;
  }
}

function showCommitDialog() {
  document.getElementById('commit-dialog').showModal();
}

document.getElementById('commit-form').addEventListener('submit', async (e) => {
  const msg = document.getElementById('commit-msg').value;
  try {
    const result = await api('POST', '/api/git/commit', { message: msg });
    toast('Committed: ' + (result.output || ''));
    document.getElementById('commit-dialog').close();
    document.getElementById('commit-msg').value = '';
    refreshGitStatus();
  } catch(e) { toast(e.message, true); }
});

async function confirmRevert() {
  const confirmed = await confirmDialog('确定撤销所有未提交的改动？此操作不可恢复。');
  if (!confirmed) return;
  await api('POST', '/api/git/revert');
  toast('已撤销');
  refreshGitStatus();
  loadWork(); loadEssays(); loadPhotos(); loadFriends();
}

async function handlePush() {
  try {
    const result = await api('POST', '/api/git/push');
    toast('Push 成功');
    refreshGitStatus();
  } catch(e) { toast(e.message, true); }
}

// ═══════════════════════════════════
// Confirm Dialog
// ═══════════════════════════════════
function confirmDialog(msg) {
  return new Promise((resolve) => {
    document.getElementById('confirm-msg').textContent = msg;
    const dialog = document.getElementById('confirm-dialog');
    const yesBtn = document.getElementById('confirm-yes');
    const handler = (e) => {
      dialog.close();
      dialog.removeEventListener('close', handler); // actually need form submit listener
      resolve(dialog.returnValue === 'default');
    };
    // Use form submit
    const form = dialog.querySelector('form');
    form.onsubmit = () => { dialog.close(); resolve(true); return false; };
    dialog.querySelector('[value="cancel"]').onclick = () => { dialog.close(); resolve(false); };
    dialog.showModal();
  });
}

// ═══════════════════════════════════
// Init
// ═══════════════════════════════════
refreshGitStatus();
loadWork();
</script>

</body>
</html>
